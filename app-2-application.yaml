apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-2
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/arminsabzehi/Git.git
    targetRevision: main
    path: apps/app-2
  destination:
    server: https://kubernetes.default.svc
    namespace: app-2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
