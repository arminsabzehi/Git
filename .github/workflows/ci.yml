# Updated workflow to include Dockerfile

name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: arminsabzehi
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t arminsabzehi/my-app:latest .

      - name: Push Docker image
        run: docker push arminsabzehi/my-app:latest
