name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: arminsabzehi
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: arminsabzehi/my-app:latest

      - name: Update deployment.yaml
        run: |
          # از تگ latest استفاده می‌کنیم (یا می‌توانید از commit SHA استفاده کنید)
          sed -i "s|arminsabzehi/my-app:.*|arminsabzehi/my-app:latest|g" deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment.yaml
          git commit -m "Update deployment.yaml to latest image [skip ci]" || echo "No changes to commit"
          git push
