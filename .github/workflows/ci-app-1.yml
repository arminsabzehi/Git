name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag-version.outputs.new_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: tag-version
        uses: actions/github-script@v7
        with:
          script: |
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            let maxVersion = 0;
            for (const tag of tags) {
              if (tag.name.startsWith('v')) {
                const version = parseInt(tag.name.slice(1));
                if (!isNaN(version) && version > maxVersion) {
                  maxVersion = version;
                }
              }
            }
            const nextVersion = maxVersion + 1;
            const newTag = `v${nextVersion}`;
            core.setOutput('new_tag', newTag);
            console.log(`New tag: ${newTag}`);

  build-and-push:
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: arminsabzehi
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/app-1
          push: true
          tags: |
            arminsabzehi/app-1:${{ needs.bump-version.outputs.new_tag }}
            arminsabzehi/app-1:latest

      - name: Create and push Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.bump-version.outputs.new_tag }}
          git push origin ${{ needs.bump-version.outputs.new_tag }}

      - name: Update deployment.yaml with new tag
        run: |
          sed -i "s|arminsabzehi/app-1:.*|arminsabzehi/app-1:${{ needs.bump-version.outputs.new_tag }}|g" deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/app-1/deployment.yaml
          git commit -m "Update app-1 deployment.yaml to ${{ needs.bump-version.outputs.new_tag }} [skip ci]"
          git push
